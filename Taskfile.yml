# https://taskfile.dev

version: "3"

dotenv:
  - .env

tasks:
  default:
    summary: Show available tasks
    silent: true
    cmds:
      - task --list

  config:
    desc: Configure the project
    silent: true
    vars:
      BUILD_TYPE: '{{.BUILD_TYPE | default "Release"}}'
      BUILD_DIR: "cmake-build-{{.BUILD_TYPE | lower}}"
    cmds:
      - |
        cmake -S . -B {{.BUILD_DIR}} \
          -DCMAKE_BUILD_TYPE={{.BUILD_TYPE}} \
          {{if .COTER_BUILD_EXAMPLE}}-DCOTER_BUILD_EXAMPLE={{.COTER_BUILD_EXAMPLE}}{{end}} \
          {{if .COTER_BUILD_TEST}}-DCOTER_BUILD_TEST={{.COTER_BUILD_TEST}}{{end}} \
          {{if .BUILD_SHARED_LIBS}}-DBUILD_SHARED_LIBS={{.BUILD_SHARED_LIBS}}{{end}} \
          {{if .BUILD_ARGS}}{{.BUILD_ARGS}}{{end}}

  build:
    desc: Build the project
    silent: true
    vars:
      BUILD_TYPE: '{{.BUILD_TYPE | default "Release"}}'
      BUILD_DIR: "cmake-build-{{.BUILD_TYPE | lower}}"
      PARALLEL_JOBS:
        sh: |
          {{if eq OS "windows"}}
          echo ${NUMBER_OF_PROCESSORS}
          {{else}}
          nproc 2>/dev/null || echo 1
          {{end}}
    cmds:
      - cmake --build {{.BUILD_DIR}} --config {{.BUILD_TYPE}} --parallel {{.PARALLEL_JOBS}}

  test:
    desc: Run tests
    silent: true
    vars:
      BUILD_TYPE: '{{.BUILD_TYPE | default "Release"}}'
      BUILD_DIR: "cmake-build-{{.BUILD_TYPE | lower}}"
    deps:
      - task: build
    cmds:
      - |
        cd {{.BUILD_DIR}}
        ctest -C {{.BUILD_TYPE}} --output-on-failure

  clean:
    desc: Clean the build directory
    silent: true
    vars:
      BUILD_TYPE: '{{.BUILD_TYPE | default "Release"}}'
      BUILD_DIR: "cmake-build-{{.BUILD_TYPE | lower}}"
    cmds:
      - rm -rf {{.BUILD_DIR}}
